<!-- Include the shared header template (DOCTYPE, head, navbar) -->
{% include "header.html" %}

<!-- Page Header - hero section with a background image for the Contact page -->
<header
  class="masthead"
  style="background-image: url('{{ url_for('static', filename='assets/img/contact-bg.jpg') }}')"
>
  <div class="container position-relative px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="page-heading">
          <!-- Conditional heading: Show success message if form was submitted, otherwise show default -->
          {% if msg_sent: %}
          <!-- Displayed after the form is successfully submitted -->
          <h1>Message Sent!</h1>
          {% else: %}
          <!-- Default heading when the page is first loaded -->
          <h1>Contact Us</h1>
          {% endif %}
          <!-- Subtitle displayed below the heading in both cases -->
          <span class="subheading">Have questions? We have answers.</span>
        </div>
      </div>
    </div>
  </div>
</header>
<!-- Main Content Section - contains the contact form -->
<main class="mb-4">
  <div class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
      <div class="col-md-10 col-lg-8 col-xl-7">
        <div class="glass-card">
          <!-- Instruction text for the user -->
          <p class="mb-4">
            Want to get in touch? Fill out the form below to send us a message and
            we will get back to you as soon as possible!
          </p>
          
          <!-- Contact Form - submits to the contact() route via POST method -->
          <form
            id="contactForm"
            name="sentMessage"
            action="{{ url_for('contact') }}"
            method="post"
          >
            <!-- Name Input - uses Bootstrap's floating label pattern -->
            <div class="form-floating mb-3">
              <input
                class="form-control"
                id="name"
                name="name"
                type="text"
                placeholder="Enter your name..."
                required
              />
              <!-- Label for the name input (floats above when focused) -->
              <label for="name">Name</label>
            </div>
            <!-- Email Input with floating label -->
            <div class="form-floating mb-3">
              <input
                class="form-control"
                id="email"
                name="email"
                type="email"
                placeholder="Enter your email..."
                required
              />
              <!-- Label for the email input -->
              <label for="email">Email address</label>
            </div>
            <!-- Phone Number Input with floating label -->
            <div class="form-floating mb-3">
              <input
                class="form-control"
                id="phone"
                name="phone"
                type="tel"
                placeholder="Enter your phone number..."
                required
              />
              <!-- Label for the phone input -->
              <label for="phone">Phone Number</label>
            </div>
            <!-- Message Textarea with floating label -->
            <div class="form-floating mb-4">
              <textarea
                class="form-control"
                id="message"
                name="message"
                placeholder="Enter your message here..."
                required
                style="height: 12rem"
              ></textarea>
              <!-- Label for the message textarea -->
              <label for="message">Message</label>
            </div>
            <!-- Submit button styled with the premium design system -->
            <div class="d-grid gap-2">
              <button
                class="btn btn-primary text-uppercase"
                id="submitButton"
                type="submit"
              >
                Send Message
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Include the shared footer template (footer content, scripts, closing tags) -->
{% include "footer.html" %}
